<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="home-container">

    <div class="homeTitle-container">
        <h1 class="homeTitle">CONTROLE FINANCEIRO</h1>

        <button class="accountButton" (click)="abrirModal('usuario')">

            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                <g id="SVGRepo_bgCarrier" stroke-width="0" />

                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />

                <g id="SVGRepo_iconCarrier">
                    <path
                        d="M15 7C15 8.65685 13.6569 10 12 10C10.3431 10 9 8.65685 9 7C9 5.34315 10.3431 4 12 4C13.6569 4 15 5.34315 15 7Z"
                        stroke="#6366F1" stroke-width="2" />

                        d="M5 19.5C5 15.9101 7.91015 13 11.5 13H12.5C16.0899 13 19 15.9101 19 19.5V20C19 20.5523 18.5523 21 18 21H6C5.44772 21 5 20.5523 5 20V19.5Z"
                        stroke="#6366F1" stroke-width="2" />
                </g>

            </svg>

        </button>

        <button class="signOutButton" routerLink="/login">

            <svg width="190px" height="190px" viewBox="0 0 24.00 24.00" fill="none" xmlns="http://www.w3.org/2000/svg"
                stroke="#000000" stroke-width="0.00024000000000000003">

                <g id="SVGRepo_bgCarrier" stroke-width="0" />

                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />

                <g id="SVGRepo_iconCarrier">
                    <path
                        d="M13 2C10.2386 2 8 4.23858 8 7C8 7.55228 8.44772 8 9 8C9.55228 8 10 7.55228 10 7C10 5.34315 11.3431 4 13 4H17C18.6569 4 20 5.34315 20 7V17C20 18.6569 18.6569 20 17 20H13C11.3431 20 10 18.6569 10 17C10 16.4477 9.55228 16 9 16C8.44772 16 8 16.4477 8 17C8 19.7614 10.2386 22 13 22H17C19.7614 22 22 19.7614 22 17V7C22 4.23858 19.7614 2 17 2H13Z"
                        fill="#6366F1" />
                    <path
                        d="M3 11C2.44772 11 2 11.4477 2 12C2 12.5523 2.44772 13 3 13H11.2821C11.1931 13.1098 11.1078 13.2163 11.0271 13.318C10.7816 13.6277 10.5738 13.8996 10.427 14.0945C10.3536 14.1921 10.2952 14.2705 10.255 14.3251L10.2084 14.3884L10.1959 14.4055L10.1915 14.4115C10.1914 14.4116 10.191 14.4122 11 15L10.1915 14.4115C9.86687 14.8583 9.96541 15.4844 10.4122 15.809C10.859 16.1336 11.4843 16.0346 11.809 15.5879L11.8118 15.584L11.822 15.57L11.8638 15.5132C11.9007 15.4632 11.9553 15.3897 12.0247 15.2975C12.1637 15.113 12.3612 14.8546 12.5942 14.5606C13.0655 13.9663 13.6623 13.2519 14.2071 12.7071L14.9142 12L14.2071 11.2929C13.6623 10.7481 13.0655 10.0337 12.5942 9.43937C12.3612 9.14542 12.1637 8.88702 12.0247 8.7025C11.9553 8.61033 11.9007 8.53682 11.8638 8.48679L11.822 8.43002L11.8118 8.41602L11.8095 8.41281C11.4848 7.96606 10.859 7.86637 10.4122 8.19098C9.96541 8.51561 9.86636 9.14098 10.191 9.58778L11 9C10.191 9.58778 10.1909 9.58773 10.191 9.58778L10.1925 9.58985L10.1959 9.59454L10.2084 9.61162L10.255 9.67492C10.2952 9.72946 10.3536 9.80795 10.427 9.90549C10.5738 10.1004 10.7816 10.3723 11.0271 10.682C11.1078 10.7837 11.1931 10.8902 11.2821 11H3Z"
                        fill="#6366F1" />
                </g>

            </svg>

        </button>

    </div>

    <div class="homeUsuario-container">

        <div class="informacoesUsuario-container">
            <p>Olá, {{ usuarioStorage?.name }}!</p>
        </div>

        <div class="graphic-container"> </div>

    </div>

    <div class="homeInformacoes-container">

        <div class="receitas-container">

            <div class="adicionarReceita-container">

                <h3>Receitas</h3>

                <button class="adicionarReceita-button" (click)="abrirModal('receita')">

                    <svg width="800px" height="90%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                        <g id="SVGRepo_bgCarrier" stroke-width="0" />

                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />

                        <g id="SVGRepo_iconCarrier">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M11 17C11 17.5523 11.4477 18 12 18C12.5523 18 13 17.5523 13 17V13H17C17.5523 13 18 12.5523 18 12C18 11.4477 17.5523 11 17 11H13V7C13 6.44771 12.5523 6 12 6C11.4477 6 11 6.44771 11 7V11H7C6.44772 11 6 11.4477 6 12C6 12.5523 6.44772 13 7 13H11V17Z"
                                fill="#ffffff" />
                        </g>

                    </svg>
                    RECEITA

                </button>

            </div>

            <div class="listarReceitas-container">

            </div>

        </div>

        <div class="despesas-container">

            <div class="adicionarDespesa-container">

                <h3>Despesas</h3>

                <button class="adicionarDespesa-button" (click)="abrirModal('despesa')">

                    <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">

                        <g id="SVGRepo_bgCarrier" stroke-width="0" />

                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />

                        <g id="SVGRepo_iconCarrier">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M11 17C11 17.5523 11.4477 18 12 18C12.5523 18 13 17.5523 13 17V13H17C17.5523 13 18 12.5523 18 12C18 11.4477 17.5523 11 17 11H13V7C13 6.44771 12.5523 6 12 6C11.4477 6 11 6.44771 11 7V11H7C6.44772 11 6 11.4477 6 12C6 12.5523 6.44772 13 7 13H11V17Z"
                                fill="#ffffff" />
                        </g>

                    </svg>
                    DESPESA
                </button>

            </div>

            <div class="listarDespesas-container">


            </div>

        </div>

        <div class="categorias-container">

            <div class="adicionarCategoria-container">

                <h3>Categorias</h3>
                <button class="adicionarCategoria-button" (click)="abrirModal('categoria')">

                    <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none"
                        xmlns="http://www.w3.org/2000/svg">

                        <g id="SVGRepo_bgCarrier" stroke-width="0" />

                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" />

                        <g id="SVGRepo_iconCarrier">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M11 17C11 17.5523 11.4477 18 12 18C12.5523 18 13 17.5523 13 17V13H17C17.5523 13 18 12.5523 18 12C18 11.4477 17.5523 11 17 11H13V7C13 6.44771 12.5523 6 12 6C11.4477 6 11 6.44771 11 7V11H7C6.44772 11 6 11.4477 6 12C6 12.5523 6.44772 13 7 13H11V17Z"
                                fill="#ffffff" />
                        </g>

                    </svg>
                    CATEGORIA
                </button>

            </div>

            <div class="listarCategorias-container"> </div>

        </div>

    </div>

    <div class="modal-overlay" *ngIf="exibirModal" (click)="fecharModal()">

        <div class="modal-janela" (click)="$event.stopPropagation()">
            <button class="btn-close" (click)="fecharModal()">&times;</button>

            <!--DIFERENTES DIVS PARA DIFERENTES TIPOS DE JANELAS QUE IRÃO SE ABRIR-->
            <div [ngSwitch]="tipoModal" class="full-height-container">
                <div *ngSwitchCase="'usuario'" class="user-layout">
                    <h1>Dados do Usuário</h1>
                    <h3>Nome</h3>
                    <form [formGroup]="userEditForm" (ngSubmit)="onSubmitUserForm()">
                        <div class="areaInput">
                            <input id="name" type="name" formControlName="name" placeholder="{{usuarioStorage?.name}}"
                                class="inputInfo">
                        </div>

                        <h3>Email</h3>
                        <div class="areaInput">
                            <input id="email" type="email" formControlName="email"
                                placeholder="{{usuarioStorage?.email}}" class="inputInfo">
                        </div>

                        <h3>Senha</h3>
                        <div class="areaInput">
                            <input id="password" type="password" formControlName="password" placeholder="************"
                                class="inputInfo">
                        </div>

                        <button type="submit" [disabled]="userEditForm.invalid" class="btn-saveInfoUser">Salvar</button>
                    </form>

                </div>

                <div *ngSwitchCase="'receita'" class="transacao-layout">
                    <h1>Nova Receita</h1>
                    <form [formGroup]="receitaForm">

                        <h3>Nome</h3>
                        <div class="areaInput">
                            <input id="name" type="name" formControlName="name" placeholder="Salário" class="inputInfo">
                        </div>

                        <div class="LinhaDiv">
                            <div>
                                <h3>Valor</h3>
                                <div class="areaLinhaInput">
                                    <input type="number" class="inputLinhaInfo" placeholder="0.00">
                                </div>
                            </div>
                            <div>
                                <h3>Categoria</h3>
                                <div class="areaCategoryInput">
                                    <select class="inputLinhaInfo"></select>
                                </div>
                            </div>
                        </div>

                        <h3>Data</h3>
                        <div class="areaValuesInput">
                            <input id="date" type="date" formControlName="date" placeholder="************"
                                class="inputValuesInfo">
                        </div>

                        <button type="submit" [disabled]="userEditForm.invalid" class="btn-saveInfoUser">Salvar</button>
                    </form>
                </div>

                <div *ngSwitchCase="'despesa'" class="transacao-layout">
                    <h1>Nova Despesa</h1>
                    <form [formGroup]="receitaForm">

                        <h3>Nome</h3>
                        <div class="areaInput">
                            <input id="name" type="name" formControlName="name" placeholder="Salário" class="inputInfo">
                        </div>

                        <div class="LinhaDiv">
                            <div>
                                <h3>Valor</h3>
                                <div class="areaLinhaInput">
                                    <input type="number" class="inputLinhaInfo" placeholder="0.00">
                                </div>
                            </div>
                            <div>
                                <h3>Categoria</h3>
                                <div class="areaCategoryInput">
                                    <select class="inputLinhaInfo"></select>
                                </div>
                            </div>
                        </div>

                        <h3>Data</h3>
                        <div class="areaValuesInput">
                            <input id="date" type="date" formControlName="date" placeholder="************"
                                class="inputValuesInfo">
                        </div>

                        <button type="submit" [disabled]="userEditForm.invalid" class="btn-saveInfoUser">Salvar</button>
                    </form>
                </div>

                <div *ngSwitchCase=" 'categoria' " class="category-layout">
                    <h1>Categoria</h1>

                    <form [formGroup]="categoryForm" (ngSubmit)="onSubmitCategoryForm()">
                        <h3>Nome da Categoria:</h3>
                        <div class="areaInput">
                            <input id="name" type="name" formControlName="name" placeholder="Lazer" class="inputInfo">
                        </div>

                        <button type="submit" class="btn-saveInfoUser">Salvar</button>

                    </form>

                </div>
            </div>
        </div>

    </div>


</div>
